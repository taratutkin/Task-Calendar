<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  :root {
    --bg:#0f0f11;--bg-card:#17171a;--bg-card2:#1e1e22;--bg-hover:#252529;
    --border:rgba(255,255,255,0.07);--border-md:rgba(255,255,255,0.12);
    --text:#e8e8ea;--text-muted:#7a7a82;--text-dim:#3e3e45;
    --accent:#7c6ef5;--accent-soft:rgba(124,110,245,0.15);
    --green:#4caf7a;--green-soft:rgba(76,175,122,0.15);
    --red:#e05555;--red-soft:rgba(224,85,85,0.15);
    --amber:#e09a35;--amber-soft:rgba(224,154,53,0.12);
    --font:-apple-system,'Segoe UI',system-ui,sans-serif;
    --radius:8px;--radius-lg:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;overflow:hidden;height:100vh;display:flex;flex-direction:column;}

  /* Header */
  #header{display:flex;align-items:center;gap:12px;padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
  #header h1{font-size:15px;font-weight:600;letter-spacing:-0.3px;}
  #header .nav-btns{display:flex;gap:4px;}
  #header button{background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;transition:all 0.15s;}
  #header button:hover{border-color:var(--border-md);color:var(--text);background:var(--bg-hover);}
  #month-label{font-size:14px;font-weight:500;min-width:140px;}
  .spacer{flex:1;}

  /* Finance */
  #finance-widget{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:5px 12px;font-size:12px;line-height:1.6;text-align:right;}
  #finance-widget .fw-label{color:var(--text-muted);}
  #finance-widget .fw-val{font-weight:600;font-size:13px;color:var(--amber);}

  /* Layout */
  #main{display:flex;flex:1;overflow:hidden;}
  #cal-panel{flex:0 0 62%;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;}

  /* Calendar */
  #cal-header{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);flex-shrink:0;}
  .dow{text-align:center;font-size:12px;color:var(--text-dim);padding:5px 0;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;}
  #cal-grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(5,1fr);overflow:hidden;}
  .day-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:3px 4px;cursor:pointer;transition:background 0.1s;overflow:hidden;position:relative;min-height:0;display:flex;flex-direction:column;}
  .day-cell:hover{background:var(--bg-hover);}
  .day-cell.today .day-num{background:var(--accent);color:#fff;border-radius:50%;width:21px;height:21px;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .day-cell.other-month{opacity:0.25;pointer-events:none;}
  .day-cell.selected{background:var(--accent-soft);}
  .day-num{font-size:13px;color:var(--text-muted);font-weight:500;width:21px;height:21px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

  /* Cell items */
  .cell-items{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:1px;margin-top:1px;}
  .ci{font-size:11px;line-height:1.3;border-radius:3px;padding:1px 4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  .ci.event{background:var(--accent-soft);color:var(--accent);}
  .ci.important{background:var(--red-soft);color:var(--red);}
  .ci.charge{background:var(--amber-soft);color:var(--amber);}
  /* habit items in a 2-col grid */
  .cell-habits{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin-top:1px;}
  .ci.habit-ok{background:var(--green-soft);color:var(--green);}
  .ci.habit-fail{background:var(--red-soft);color:var(--red);}

  /* Right panel */
  #right-panel{flex:1;display:flex;flex-direction:column;overflow-y:auto;}
  .rblock{border-bottom:1px solid var(--border);padding:10px 12px;flex-shrink:0;}
  .rblock-header{display:flex;align-items:center;margin-bottom:8px;}
  .rblock-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim);}
  .rblock-header .spacer{flex:1;}
  .icon-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:15px;padding:2px 4px;border-radius:4px;transition:all 0.15s;display:flex;align-items:center;}
  .icon-btn:hover{color:var(--text);background:var(--bg-hover);}

  /* Inline add row (hidden by default, toggled by +) */
  .inline-add{display:none;flex-direction:column;gap:6px;margin-bottom:8px;padding:8px;background:var(--bg-card2);border-radius:var(--radius);border:1px solid var(--border);}
  .inline-add.open{display:flex;}
  .inline-add input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;outline:none;}
  .inline-add input:focus{border-color:var(--accent);}
  .inline-add-btns{display:flex;gap:6px;}
  .inline-add-btns button{flex:1;padding:5px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text-muted);transition:all 0.15s;}
  .inline-add-btns .btn-confirm{background:var(--accent);border-color:var(--accent);color:#fff;}

  /* Todo */
  .todo-item{display:flex;align-items:flex-start;gap:7px;padding:4px 0;position:relative;}
  .todo-item:hover .todo-del{opacity:1;}
  .todo-check{width:15px;height:15px;border:1.5px solid var(--border-md);border-radius:4px;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
  .todo-check.done{background:var(--green);border-color:var(--green);}
  .todo-check.done::after{content:'';display:block;width:7px;height:4px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px);}
  .todo-text{flex:1;font-size:12px;line-height:1.4;}
  .todo-text.done{text-decoration:line-through;color:var(--text-muted);}
  .todo-meta{font-size:10px;color:var(--text-muted);margin-top:1px;}
  .todo-del{opacity:0;background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;padding:0 2px;transition:opacity 0.15s;line-height:1;}
  .empty-hint{font-size:12px;color:var(--text-dim);padding:4px 0;}

  /* Habits */
  .habits-table{width:100%;border-collapse:collapse;font-size:12px;}
  .habits-table th{color:var(--text-dim);font-weight:500;font-size:10px;text-align:center;padding:2px 4px;min-width:28px;}
  .habits-table th.name-col{text-align:left;}
  .habits-table td{padding:2px 2px;vertical-align:middle;}
  .habits-table td.name-col{color:var(--text);font-size:12px;padding-right:6px;white-space:nowrap;}
  .habit-toggle{width:24px;height:24px;border-radius:5px;border:1.5px solid var(--border-md);cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:12px;transition:all 0.15s;background:transparent;}
  .habit-toggle.ok{background:var(--green-soft);border-color:var(--green);color:var(--green);}
  .habit-toggle.fail{background:var(--red-soft);border-color:var(--red);color:var(--red);}
  .habit-toggle:hover{border-color:var(--border-md);background:var(--bg-hover);}
  .week-range{font-size:10px;color:var(--text-muted);}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:none;align-items:center;justify-content:center;}
  .overlay.open{display:flex;}
  .modal{background:var(--bg-card);border:1px solid var(--border-md);border-radius:var(--radius-lg);padding:18px;width:360px;max-height:90vh;overflow-y:auto;}
  .modal h3{font-size:14px;font-weight:600;margin-bottom:12px;}
  .modal-tabs{display:flex;gap:5px;margin-bottom:12px;}
  .modal-tab{flex:1;padding:5px 4px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text-muted);cursor:pointer;font-size:12px;text-align:center;transition:all 0.15s;white-space:nowrap;}
  .modal-tab.active{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
  .modal-tab.important-tab.active{border-color:var(--red);color:var(--red);background:var(--red-soft);}
  .modal-tab.charge-tab.active{border-color:var(--amber);color:var(--amber);background:var(--amber-soft);}
  .mrow{margin-bottom:9px;}
  .mrow label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:3px;}
  .mrow input,.mrow select,.mrow textarea{width:100%;background:var(--bg-card2);border:1px solid var(--border);border-radius:6px;padding:6px 9px;color:var(--text);font-size:13px;outline:none;font-family:var(--font);}
  .mrow input:focus,.mrow select:focus{border-color:var(--accent);}
  .mrow select option{background:#222;}
  .mrow-inline{display:flex;align-items:center;gap:8px;}
  .mrow-inline input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);flex-shrink:0;cursor:pointer;}
  .mrow-inline label{font-size:13px;color:var(--text);cursor:pointer;}
  .mrow-time{display:flex;align-items:center;gap:8px;}
  .mrow-time input[type=time]{flex:1;background:var(--bg-card2);border:1px solid var(--border);border-radius:6px;padding:6px 9px;color:var(--text);font-size:13px;outline:none;}
  .mrow-time input[type=time]:focus{border-color:var(--accent);}
  .mrow-time .no-time-label{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted);cursor:pointer;white-space:nowrap;}
  .mrow-time .no-time-label input{width:14px;height:14px;accent-color:var(--accent);}
  .charge-f,.event-time-f{display:none;}
  .charge-f.show,.event-time-f.show{display:block;}
  .modal-btns{display:flex;gap:7px;margin-top:12px;}
  .modal-btns button{flex:1;padding:7px;border-radius:6px;cursor:pointer;font-size:13px;border:1px solid var(--border);background:none;color:var(--text-muted);transition:all 0.15s;}
  .modal-btns .btn-save{background:var(--accent);border-color:var(--accent);color:#fff;}

  /* Existing events list in modal */
  #modal-existing{margin-top:8px;}
  .ev-exist-item{display:flex;align-items:center;gap:6px;padding:4px 0;border-top:1px solid var(--border);}
  .ev-exist-item span{flex:1;font-size:12px;}
  .ev-del-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;padding:2px;}

  /* Single notification popup */
  #snotif{position:fixed;bottom:24px;right:24px;z-index:500;display:none;flex-direction:column;gap:0;}
  #snotif.open{display:flex;}
  .snotif-card{background:var(--bg-card);border:1px solid var(--border-md);border-radius:var(--radius-lg);padding:16px 18px;width:320px;box-shadow:0 4px 24px rgba(0,0,0,0.4);}
  .snotif-card .sn-type{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
  .snotif-card .sn-text{font-size:13px;line-height:1.5;margin-bottom:12px;}
  .snotif-card .sn-ok{width:100%;padding:7px;background:var(--accent);border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:13px;font-weight:500;}

  /* Todo notif */
  #todo-notif-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;display:none;align-items:center;justify-content:center;}
  #todo-notif-overlay.open{display:flex;}
  #todo-notif-box{background:var(--bg-card);border:1px solid var(--border-md);border-radius:var(--radius-lg);padding:20px;width:380px;}
  .tno-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
  .tno-text{font-size:13px;line-height:1.5;margin-bottom:6px;}
  .tno-elapsed{font-size:12px;color:var(--amber);margin-bottom:14px;}
  .tno-btns{display:flex;gap:8px;}
  .tno-btns button{flex:1;padding:7px;border-radius:6px;cursor:pointer;font-size:13px;border:1px solid var(--border);background:none;color:var(--text);transition:all 0.15s;}
  .tno-btns .tno-yes{background:var(--green-soft);border-color:var(--green);color:var(--green);}

  /* Habit cfg modal */
  #habit-cfg-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:none;align-items:center;justify-content:center;}
  #habit-cfg-overlay.open{display:flex;}
  #habit-cfg-box{background:var(--bg-card);border:1px solid var(--border-md);border-radius:var(--radius-lg);padding:18px;width:300px;}
  #habit-cfg-box h3{font-size:14px;font-weight:600;margin-bottom:10px;}
  .hcfg-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
  .hcfg-row label{font-size:12px;color:var(--text-muted);min-width:90px;}
  .hcfg-row input{flex:1;background:var(--bg-card2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;outline:none;}

  ::-webkit-scrollbar{width:3px;height:3px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:2px;}
</style>
</head>

const now=()=>new Date();
function dateKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function todayKey(){const t=now();return dateKey(t.getFullYear(),t.getMonth(),t.getDate());}
function parseKey(k){const[y,m,d]=k.split('-').map(Number);return{y,m:m-1,d};}
function addDays(date,n){const d=new Date(date);d.setDate(d.getDate()+n);return d;}
function isSameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function formatDateTime(ts){const d=new Date(ts);return `${d.getDate()} ${MONTHS_GEN[d.getMonth()]}, ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function elapsed(ts){const ms=Date.now()-ts;const mins=Math.floor(ms/60000);const hours=Math.floor(mins/60);const days=Math.floor(hours/24);if(days>0)return `${days} –¥–Ω. ${hours%24} —á. ${mins%60} –º–∏–Ω.`;if(hours>0)return `${hours} —á. ${mins%60} –º–∏–Ω.`;return `${mins} –º–∏–Ω.`;}
function fmtAmount(a){const n=parseFloat(a)||0;const r=Math.round(n*100)/100;return r===Math.floor(r)?String(Math.floor(r)):r.toFixed(2);}
function fmtCurrency(amount,currency){const a=fmtAmount(amount);return currency==='$'?('$ '+a):(a+' '+currency);}

function getWeekStart(date){const d=new Date(date);const dow=d.getDay();const diff=(dow===0)?-6:1-dow;d.setDate(d.getDate()+diff);return d;}

function renderCalendar(){
  const{viewYear:y,viewMonth:m}=S;
  document.getElementById('month-label').textContent=MONTHS_RU[m][0].toUpperCase()+MONTHS_RU[m].slice(1)+' '+y;
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';

  const firstDay=new Date(y,m,1);
  let startDow=firstDay.getDay();if(startDow===0)startDow=7;startDow--;
  const daysInMonth=new Date(y,m+1,0).getDate();
  const t=now();

  // Only 5 rows; hide cells that don't belong to current month and aren't on the same week as a current-month day
  for(let row=0;row<5;row++){
    for(let col=0;col<7;col++){
      const i=row*7+col;
      const cell=document.createElement('div');
      cell.className='day-cell';

      let cellDate,otherMonth=false;
      const dayNum=i-startDow+1;

      if(dayNum<1){
        // prev month
        const pm=m-1<0?11:m-1;const py=m-1<0?y-1:y;
        cellDate=new Date(py,pm,new Date(py,pm+1,0).getDate()+dayNum);
        otherMonth=true;
      } else if(dayNum>daysInMonth){
        // next month
        const nm=m+1>11?0:m+1;const ny=m+1>11?y+1:y;
        cellDate=new Date(ny,nm,dayNum-daysInMonth);
        otherMonth=true;
      } else {
        cellDate=new Date(y,m,dayNum);
      }

      // Hide overflow cells (row 5 cells that are all other-month = row where no current-month day exists)
      if(otherMonth){
        // check if any cell in this row belongs to current month
        const rowStart=row*7-startDow+1;
        const rowEnd=rowStart+6;
        const hasCurrentMonth=rowStart<=daysInMonth&&rowEnd>=1;
        if(!hasCurrentMonth){
          cell.style.visibility='hidden';
          cell.style.cursor='default';
          grid.appendChild(cell);
          continue;
        }
        cell.classList.add('other-month');
      }

      const isToday=isSameDay(cellDate,t);
      if(isToday)cell.classList.add('today');
      const key=dateKey(cellDate.getFullYear(),cellDate.getMonth(),cellDate.getDate());
      if(S.selectedDate===key)cell.classList.add('selected');

      const numDiv=document.createElement('div');numDiv.className='day-num';
      numDiv.textContent=cellDate.getDate();cell.appendChild(numDiv);

      const itemsDiv=document.createElement('div');itemsDiv.className='cell-items';

      // Events (full width)
      const evs=S.events[key]||[];
      evs.forEach(ev=>{
        const ci=document.createElement('div');
        if(ev.type==='charge'){
          ci.className='ci charge';
          ci.textContent=fmtCurrency(ev.amount,ev.currency)+' '+ev.text;
        } else if(ev.type==='important'){
          ci.className='ci important';
          const timeStr=(!ev.noTime&&ev.time)?ev.time+' ':'';
          ci.textContent=`‚ùó${timeStr}${ev.text}`;
        } else {
          ci.className='ci event';
          ci.textContent=ev.text;
        }
        itemsDiv.appendChild(ci);
      });

      // Habits (2-col grid)
      const habitItems=[];
      const hlog=S.habitLog[key]||{};
      S.habits.forEach(h=>{
        if(hlog[h.id]){
          const sym=h.calSymbol||h.name.slice(0,4);
          habitItems.push({cls:'habit-'+(hlog[h.id]==='ok'?'ok':'fail'),text:sym+' '+(hlog[h.id]==='ok'?'‚úì':'‚úó')});
        }
      });
      const flog=S.faceLog[key]||{};
      ['morning','evening'].forEach(slot=>{
        if(flog[slot]){
          const sym=S.faceCalSymbol[slot]||(slot==='morning'?'‚òÄ':'üåô');
          habitItems.push({cls:'habit-'+(flog[slot]==='ok'?'ok':'fail'),text:sym+' '+(flog[slot]==='ok'?'‚úì':'‚úó')});
        }
      });
      if(habitItems.length){
        const grid2=document.createElement('div');grid2.className='cell-habits';
        habitItems.forEach(hi=>{
          const ci=document.createElement('div');ci.className='ci '+hi.cls;ci.textContent=hi.text;
          grid2.appendChild(ci);
        });
        itemsDiv.appendChild(grid2);
      }

      cell.appendChild(itemsDiv);
      if(!otherMonth)cell.addEventListener('click',()=>openModal(key,cellDate));
      grid.appendChild(cell);
    }
  }
}

function updateFinance(){
  const t=now();const y=t.getFullYear(),m=t.getMonth();
  const todayD=t.getDate();
  const daysInMonth=new Date(y,m+1,0).getDate();
  let gel=0,usd=0,rub=0;
  // 1) explicit charges in current month from today onwards
  for(let d=todayD;d<=daysInMonth;d++){
    (S.events[dateKey(y,m,d)]||[]).forEach(ev=>{
      if(ev.type!=='charge')return;
      if(ev.done)return; // marked as paid ‚Äî skip
      if(ev.currency==='‚Çæ')gel+=parseFloat(ev.amount)||0;
      else if(ev.currency==='$')usd+=parseFloat(ev.amount)||0;
      else if(ev.currency==='‚ÇΩ')rub+=parseFloat(ev.amount)||0;
    });
  }
  // 2) recurring from other months ‚Äî project into remaining days of current month
  const covered=new Set();
  for(let d=todayD;d<=daysInMonth;d++){
    (S.events[dateKey(y,m,d)]||[]).forEach(ev=>{
      if(ev.type==='charge')covered.add(ev.text+'|'+ev.currency+'|'+d);
    });
  }
  Object.entries(S.events).forEach(([key,evs])=>{
    const{y:ky,m:km,d:kd}=parseKey(key);
    if(ky===y&&km===m)return;
    evs.forEach(ev=>{
      if(!ev.recurring||ev.type!=='charge'||ev.done)return;
      if(kd<todayD||kd>daysInMonth)return;
      const uid=ev.text+'|'+ev.currency+'|'+kd;
      if(covered.has(uid))return;
      covered.add(uid);
      if(ev.currency==='‚Çæ')gel+=parseFloat(ev.amount)||0;
      else if(ev.currency==='$')usd+=parseFloat(ev.amount)||0;
      else if(ev.currency==='‚ÇΩ')rub+=parseFloat(ev.amount)||0;
    });
  });
  const parts=[];
  if(gel>0)parts.push(fmtAmount(gel)+' ‚Çæ');
  if(usd>0)parts.push('$ '+fmtAmount(usd));
  if(rub>0)parts.push(fmtAmount(rub)+' ‚ÇΩ');
  document.getElementById('fw-val').textContent=parts.length?parts.join('  ¬∑  '):'‚Äî';
}

  const dates=getWeekDates();

    ?`${ws.getDate()}‚Äì${we.getDate()} ${MONTHS_GEN[ws.getMonth()]}`
    :`${ws.getDate()} ${MONTHS_GEN[ws.getMonth()]}‚Äì${we.getDate()} ${MONTHS_GEN[we.getMonth()]}`;

  curLbl.textContent=wLabel;
  curLbl.style.color=S.weekOffset===0?'var(--accent)':'var(--text-muted)';

  if(!S.habits.length){wrap.innerHTML='<div class="empty-hint">–ü–æ–∫–∞ –Ω–µ—Ç –ø—Ä–∏–≤—ã—á–µ–∫...</div>';return;}
  const table=document.createElement('table');table.className='habits-table';
  const thead=document.createElement('thead');
  thead.innerHTML=`<tr><th class="name-col"></th>${DAYS_RU.map(d=>`<th>${d}</th>`).join('')}<th></th></tr>`;
  table.appendChild(thead);
  const tbody=document.createElement('tbody');
  S.habits.forEach(h=>{
    const tr=document.createElement('tr');
    let cells=`<td class="name-col">${h.name}</td>`;
    dates.forEach(d=>{
      const k=dateKey(d.getFullYear(),d.getMonth(),d.getDate());
      const v=(S.habitLog[k]||{})[h.id]||'';
      cells+=`<td><button class="habit-toggle${v?' '+v:''}" data-hid="${h.id}" data-key="${k}">${v==='ok'?'‚úì':v==='fail'?'‚úó':''}</button></td>`;
    });
    cells+=`<td><button style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:11px;padding:0 3px;" class="habit-del-btn" data-hid="${h.id}"><i class="ti ti-x"></i></button></td>`;
    tr.innerHTML=cells;tbody.appendChild(tr);
  });
  table.appendChild(tbody);wrap.innerHTML='';wrap.appendChild(table);
  wrap.querySelectorAll('.habit-toggle').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const{hid,key}=btn.dataset;
      const cur=(S.habitLog[key]||{})[hid]||'';
      const next=cur===''?'ok':cur==='ok'?'fail':'';
      if(!S.habitLog[key])S.habitLog[key]={};

      save('cal_habitlog2',S.habitLog);renderHabitsBlock();renderCalendar();
    });

      S.habits=S.habits.filter(h=>h.id!==btn.dataset.hid);
      save('cal_habits2',S.habits);renderHabitsBlock();renderCalendar();
    });
  });
}

// ==================== NOTIFICATIONS ====================
// Queue of pending popups
let notifQueue=[];
let notifShowing=false;

function queueNotif(type,text,dateStr){
  // –í–Ω—É—Ç—Ä–µ–Ω–Ω–µ–µ —É–≤–µ–¥–æ–º–ª–µ–Ω–∏–µ –Ω–∞ —Å—Ç—Ä–∞–Ω–∏—Ü–µ ‚Äî –æ—Å—Ç–∞–≤–ª—è–µ–º
  notifQueue.push({type,text,dateStr});
  if(!notifShowing)showNextNotif();

  // –£–≤–µ–¥–æ–º–ª–µ–Ω–∏–µ Windows / –±—Ä–∞—É–∑–µ—Ä–∞
  showSystemNotification(type, text);
}

function showSystemNotification(title, body){
  if (!('Notification' in window)) return;

  if (Notification.permission === 'granted') {
    new Notification(title, {
      body: body,
      tag: title + body,
      requireInteraction: false
    });
  } else if (Notification.permission === 'default') {
    Notification.requestPermission().then(permission => {
      if (permission === 'granted') {
        new Notification(title, {
          body: body,
          tag: title + body,
          requireInteraction: false
        });
      }
    });
  }
}

function showNextNotif(){
  if(!notifQueue.length){notifShowing=false;document.getElementById('snotif').classList.remove('open');return;}
  notifShowing=true;
  const item=notifQueue.shift();
  document.getElementById('sn-type').textContent=item.type;
  document.getElementById('sn-text').textContent=item.text;
  document.getElementById('snotif').classList.add('open');
}

document.getElementById('sn-ok').addEventListener('click',()=>{
  document.getElementById('snotif').classList.remove('open');
  setTimeout(showNextNotif,300);
});

function buildDayEvents(key){
  const evs=S.events[key]||[];
  const result=[];
  evs.forEach(ev=>result.push(ev));
  // Add recurring
  Object.entries(S.events).forEach(([k,evlist])=>{
    const{m,d}=parseKey(k);
    const{m:km,d:kd}=parseKey(key);
    evlist.forEach(ev=>{
      if(ev.recurring&&ev.type==='charge'&&d===kd&&m!==km)
        result.push(ev);
    });
  });
  return result;
}

function notifLabel(key){
  const t=now();
  const{y,m,d}=parseKey(key);
  const cellDate=new Date(y,m,d);
  if(isSameDay(cellDate,t))return '–°–µ–≥–æ–¥–Ω—è';
  if(isSameDay(cellDate,addDays(t,1)))return '–ó–∞–≤—Ç—Ä–∞';
  return `${d} ${MONTHS_GEN[m]}`;
}

function checkScheduledNotifs(){
  const t=now();
  const tk=todayKey();
  const tomKey=dateKey(t.getFullYear(),t.getMonth(),t.getDate()+1);
  [tk,tomKey].forEach(key=>{
    const label=notifLabel(key);
    const{d,m}=parseKey(key);
    buildDayEvents(key).forEach(ev=>{
      if(ev.type==='charge'){
        const storKey=`notif_charge_${key}_${ev.text}`;
        const lastSent=load(storKey,0);
        const twoHours=2*60*60*1000;
        if(Date.now()-lastSent>twoHours){
          save(storKey,Date.now());
          queueNotif('–°–ø–∏—Å–∞–Ω–∏–µ',`${label}, ${d} ${MONTHS_GEN[m]}: ${fmtCurrency(ev.amount,ev.currency)} ‚Äî ${ev.text}`);
        }
      } else if(ev.type==='event'||(ev.type==='important'&&ev.noTime)){
        const storKey=`notif_ev_${key}_${ev.text}`;
        const lastSent=load(storKey,0);
        const twoHours=2*60*60*1000;
        if(Date.now()-lastSent>twoHours){
          save(storKey,Date.now());
          const prefix=ev.type==='important'?'‚ùó ':'';
          queueNotif(ev.type==='important'?'–í–∞–∂–Ω–æ–µ —Å–æ–±—ã—Ç–∏–µ':'–°–æ–±—ã—Ç–∏–µ',`${label}, ${d} ${MONTHS_GEN[m]}: ${prefix}${ev.text}`);
        }
      } else if(ev.type==='important'&&!ev.noTime&&ev.time&&key===tk){
        // Timed important events: remind at -5h, -3h, -1h, -30m, -15m
        const[hh,mm]=ev.time.split(':').map(Number);
        const evMs=new Date(t.getFullYear(),t.getMonth(),t.getDate(),hh,mm,0).getTime();
        const deltas=[5*60,3*60,60,30,15]; // minutes before
        deltas.forEach(deltaMin=>{
          const triggerTime=evMs-deltaMin*60*1000;
          const windowMs=5*60*1000; // 5-min window
          if(t.getTime()>=triggerTime&&t.getTime()<triggerTime+windowMs){
            const storKey=`notif_imp_${key}_${ev.text}_${deltaMin}`;
            if(!load(storKey,false)){
              save(storKey,true);
              queueNotif('–í–∞–∂–Ω–æ–µ —Å–æ–±—ã—Ç–∏–µ',`–ß–µ—Ä–µ–∑ ${deltaMin<60?deltaMin+' –º–∏–Ω.':deltaMin/60+' —á.'} ‚Äî ‚ùó ${ev.time} ${ev.text}`);
            }
          }
        });
      }
    });
  });
}
